# CONFIGURACION LOGGIN DE APPLCACION
handlers= java.util.logging.FileHandler, java.util.logging.ConsoleHandler

# Formato de los logs
java.util.logging.SimpleFormatter.format=%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s %2$s %5$s%6$s%n

# Archivo de log
java.util.logging.FileHandler.pattern = logs/mediateca_%u.log
java.util.logging.FileHandler.limit = 50000
java.util.logging.FileHandler.count = 5
java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter

# Nivel de logging por defecto
.level = INFO

# Logging espec\u00c3\u00adfico por paquete
com.mediateca.level = FINE
com.mediateca.db.level = FINER
com.mediateca.service.level = CONFIG